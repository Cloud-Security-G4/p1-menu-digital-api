version: "3.9"
services:
  api:
    build: .
    container_name: menu-api
    ports:
      - "8000:80"
    env_file:
      - .env
    volumes:
      - ./database:/var/www/html/database
    environment:
      APP_KEY: base64:$(php artisan key:generate --show)
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      CACHE_STORE: file
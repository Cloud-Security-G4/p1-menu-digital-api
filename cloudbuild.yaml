steps:

# 1. Build
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-t',
      'us-west1-docker.pkg.dev/cloud-security-491400/livemenu/backend:latest',
      '.'
    ]

# 2. Push BEFORE deploy
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'push',
      'us-west1-docker.pkg.dev/cloud-security-491400/livemenu/backend:latest'
    ]

# 3. Scan (non-blocking)
- name: 'aquasec/trivy:0.51.0'
  args:
    [
      'image',
      '--scanners', 'vuln',
      '--severity', 'HIGH,CRITICAL',
      '--ignorefile', '/workspace/.trivyignore',
      '--exit-code', '0',
      'us-west1-docker.pkg.dev/cloud-security-491400/livemenu/backend:latest'
    ]

# 4. Deploy to Cloud Run with Cloud SQL
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    [
      'run', 'deploy', 'livemenu-backend',
      '--image', 'us-west1-docker.pkg.dev/cloud-security-491400/livemenu/backend:latest',
      '--region', 'us-west1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8080',
      '--memory', '512Mi',
      '--timeout', '60',
      '--add-cloudsql-instances', 'cloud-security-491400:us-west1:livemenu-db',
      '--set-env-vars', 'APP_ENV=production,APP_DEBUG=false,APP_URL=https://livemenuapp.net,FRONTEND_URL=https://livemenuapp.net,LOG_CHANNEL=stderr,DB_CONNECTION=pgsql,DB_HOST=/cloudsql/cloud-security-491400:us-west1:livemenu-db,DB_PORT=5432,DB_DATABASE=menu_db,ENABLE_DB_INIT=false,GOOGLE_CLOUD_PROJECT_ID=cloud-security-491400,GCS_BUCKET=livemenu-images-491400,FILESYSTEM_DISK=gcs',
      '--set-secrets', 'APP_KEY=APP_KEY:latest,DB_USERNAME=DB_USERNAME:latest,DB_PASSWORD=DB_PASSWORD:latest,PASSPORT_PRIVATE_KEY=PASSPORT_PRIVATE_KEY:latest,PASSPORT_PUBLIC_KEY=PASSPORT_PUBLIC_KEY:latest',
      '--quiet'
    ]

images:
- us-west1-docker.pkg.dev/cloud-security-491400/livemenu/backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
